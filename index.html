<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  min-height: 100vh;
  background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f5f0ff 100%);
  display: flex; align-items: center; justify-content: center;
  font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
.card {
  background: #fff;
  border-radius: 16px;
  box-shadow: 0 8px 40px rgba(80,100,180,0.13);
  padding: 48px 44px 40px;
  width: 380px;
  max-width: 94vw;
}
.logo {
  text-align: center;
  margin-bottom: 28px;
}
.logo-icon {
  width: 54px; height: 54px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  border-radius: 14px;
  display: inline-flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
}
.logo-icon svg { width: 28px; height: 28px; fill: #fff; }
.logo h1 { font-size: 20px; color: #1a1f36; font-weight: 700; letter-spacing: 1px; }
.logo p { font-size: 12px; color: #8898aa; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 13px; color: #4a5568; font-weight: 600; margin-bottom: 7px; }
.field input {
  width: 100%; padding: 11px 14px;
  border: 1.5px solid #e2e8f0;
  border-radius: 8px; font-size: 14px; color: #2d3748;
  outline: none; transition: border-color .2s, box-shadow .2s;
  background: #f9fafc;
}
.field input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.13); background: #fff; }
.btn {
  width: 100%; padding: 13px;
  background: linear-gradient(135deg, #667eea, #764ba2);
  color: #fff; border: none; border-radius: 8px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  letter-spacing: 2px; margin-top: 8px;
  transition: opacity .2s, transform .1s;
}
.btn:hover { opacity: .92; }
.btn:active { transform: scale(.98); }
.btn:disabled { opacity: .6; cursor: not-allowed; }
.error {
  color: #e53e3e; font-size: 13px; text-align: center;
  margin-top: 14px; min-height: 20px;
}
.tip { text-align: center; font-size: 12px; color: #a0aec0; margin-top: 22px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    </div>
    <h1>域名监控面板</h1>
    <p>Domain Monitor Panel</p>
  </div>
  <div class="field">
    <label>账号</label>
    <input type="email" id="email" placeholder="请输入账号" autocomplete="username" />
  </div>
  <div class="field">
    <label>密码</label>
    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" />
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
  <div class="error" id="errMsg"></div>
  <div class="tip">如忘记密码请联系管理员重置</div>
</div>

<script>
const SUPABASE_URL = 'https://kjfglthwocbzinkiyfxm.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtqZmdsdGh3b2Niemlua2l5ZnhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3MDA0ODMsImV4cCI6MjA5ODI3NjQ4M30.IDDfWZf0Q2DW2DTm6hmoPsQDsFmBzZmkZP1KKjxJct8'
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON)

// 已登录则直接跳面板
sb.auth.getSession().then(({data:{session}}) => {
  if (session) window.location.href = 'panel.html'
})

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin()
})

async function doLogin() {
  const email = document.getElementById('email').value.trim()
  const password = document.getElementById('password').value
  const btn = document.getElementById('loginBtn')
  const err = document.getElementById('errMsg')
  if (!email || !password) { err.textContent = '请填写账号和密码'; return }
  btn.disabled = true; btn.textContent = '登录中...'
  err.textContent = ''
  const { error } = await sb.auth.signInWithPassword({ email, password })
  if (error) {
    err.textContent = '账号或密码错误，请重试'
    btn.disabled = false; btn.textContent = '登 录'
  } else {
    window.location.href = 'panel.html'
  }
}
</script>
</body>
</html>
